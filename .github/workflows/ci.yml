name: CI

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    - cron: '0 7 * * *'   # nightly — exercises the (otherwise gated) e2e job

jobs:
  web:
    name: Web (Next.js / Jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      # Guard: the worker's test schema.sql must not drift from prisma/schema.prisma.
      - run: node ../../tools/check_schema_drift.mjs
      - run: npm run lint
      # Unit + integration with the merged coverage gate (jest.all.config.ts).
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: web-coverage
          path: apps/web/coverage
          if-no-files-found: ignore

  worker:
    name: Worker (Python / pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # Fully dependency-injected suite — requirements-dev.txt is test-only
      # (pytest, pytest-cov, requests, PyYAML); none of the heavy runtime deps
      # (anthropic / pypdf / apscheduler / tectonic) are needed or installed.
      - run: pip install -r requirements-dev.txt
      # Coverage floor (fail_under=85) lives in pyproject [tool.coverage.report] so
      # local and CI enforce the same threshold from one place — no --cov-fail-under here.
      - run: python -m pytest --cov --cov-report=xml --cov-report=term-missing
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: worker-coverage
          path: apps/worker/coverage.xml
          if-no-files-found: ignore

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    # Heavy (browser install + web build): only on master, nightly, or PRs labeled 'e2e'.
    if: >
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      contains(github.event.pull_request.labels.*.name, 'e2e')
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - id: pw
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}
      - run: npx playwright install --with-deps chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
      - run: npx playwright install-deps chromium
        if: steps.pw-cache.outputs.cache-hit == 'true'
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7
          if-no-files-found: ignore
